[workspace]
name = "atomea"
description = "A hierarchical data model for atomistic systems"
authors = [
    "Scientific Computing Studio <us@scient.ing>",
]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]
readme = "README.md"

[pypi-dependencies]
atomea = { path = ".", editable = true }
raygent = { git = "https://github.com/scienting/raygent", branch = "main" }

[environments]
dev = ["dev"]
docs = ["docs"]

[tasks]
uuid = 'python -c "import uuid; print(uuid.uuid4())"'

[dependencies]
python = ">=3.12"
loguru = ">=0.7.3,<1.0"
numpy = ">2.0.0,<3"
pydantic = ">=2.10.6,<3"
pyyaml = ">=6.0.2,<7"
zarr = ">=3.0.0,<4"
polars = ">=1.10.0,<2"

[feature.dev.dependencies]
ruff = ">=0.15.0,<0.18"
setuptools = ">=82.0.0,<83"
setuptools-scm = ">=9.2.2,<10"
wheel = ">=0.46.3,<0.47"
pytest = ">=9.0.2,<10"
pytest-cov = ">=4.1.0"
pytest-html = ">=4.0.1"
gh = { version = ">=2.87.2,<3", channel = "conda-forge" }
bump-my-version = ">=1.2.7,<2"
click = ">=8.3.1,<9"
rich = ">=14.3.3,<15"
coverage = ">=7.3.1"
mdanalysis = ">=2.8.0,<3"
twine = ">=6.1.0,<7"

[feature.dev.tasks]
mdlint = { cmd = ["markdownlint-cli2", '"docs/*.{md,markdown}"', "--fix", "--config", ".markdownlint.yaml", "||", "true"] }
isort = { cmd = ["isort", "--settings-path", ".isort.cfg", "./atomea", "./tests", "||", "true"] }
ruff = { cmd = ["ruff", "format", "--config", ".ruff.toml", "./atomea", "./tests", "||", "true"] }
lint = { cmd = ["ruff", "check", "--fix", "--config", ".ruff.toml", "./"] }
format = { depends-on = ["lint"], cmd = ["ruff", "check", "--select", "I", "--fix", "&&", "ruff", "format", "--config", ".ruff.toml", "./"] }
data = { cmd = ["rm", "-rf", "tests/files", "&&", "git", "clone", "git@github.com:scienting/atomea-data.git", "tests/files"]}
tests = { cmd = [
    "PYTHONPATH=.",
    "pytest",
    "-c",
    ".pytest.ini",
    "--cov='atomea'",
    "--cov-report=xml",
    "--junit-xml=report.xml",
    "--failed-first",
]}
coverage = { cmd = ["coverage", "report"] }
cleanup-build = { cmd = ["rm", "-rf", "./build"] }
build = { cmd = ["python3", "-m", "build"], depends-on = ["cleanup-build"]}
publish-test = { cmd = ["twine", "upload", "--repository", "testpypi", "dist/*"] }
publish = { cmd = ["twine", "upload", "dist/*"] }

[feature.dev.pypi-dependencies]
build = ">=1.2.2.post1,<2"
setuptools-scm = ">=8.0.0"

[feature.docs.dependencies]
# Will need to migrate to https://zensical.org/ once it matures.
mkdocs = ">=1.6.1,<2"
mkdocs-material = ">=9.5.44,<10"
mkdocstrings = ">=1.0.3,<2"
mkdocstrings-python = ">=2.0.2,<3"
mkdocs-macros-plugin = ">=1.5.0,<2"
mkdocs-glightbox = ">=0.5.2,<0.6"
mkdocs-git-revision-date-localized-plugin = ">=1.2.9,<2"
mkdocs-autorefs = ">=1.4.4,<2"
mkdocs-gen-files = ">=0.6.0,<0.7"
pymdown-extensions = ">=10.21,<11"

[feature.docs.tasks]
docs = { cmd = ["rm", "-rf", "./public/", "&&", "mkdocs", "build", "-d", "public/"] }
docs-serve = { cmd = ["mkdocs", "serve"] }

[feature.docs.pypi-dependencies]
mkdocs-awesome-nav = ">=3.3.0, <4"
